{% extends "base.html" %}
{% block title %}Home{% endblock %}
{% block content %}
  <div class="main">
    <h1>Add Employees Data</h1>
    <form action="{{ url_for('home') }}" method="POST">
      <div class="home-form">
        <label for="name">Employee Name:</label>
        <input type="text" name="employee_name" id="name">
      </div>
      <div class="home-form">
        <label for="email">Employee Email:</label>
        <input type="email" name="employee_email" id="email">
      </div>
      <div class="home-form">
        <label for="phone">Employee Phone No.</label>
        <input type="tel" name="employee_phone" id="phone">
      </div>
      <div class="home-form">
        <label for="dob">Employee DOB</label>
        <input type="date" name="employee_dob" id="dob">
      </div>
      <div class="home-form">
        <label for="gender">Employee Gender</label>
        <select name="employee_gender" id="gender">
          <option disabled selected>--Select Gender--</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>
      <div class="home-form">
        <label for="address">Employee Address</label>
        <textarea name="employee_address" id="address"></textarea>
      </div>
      <div class="home-form">
        <input onclick="submit()" type="submit">
      </div>
    </form>
  </div>
  <p>{{ emp_dob }}</p>
{% endblock %}
